# Render Blueprint — Terra Pride Photo Vote
# Render → New → Blueprint → connect this repo. Fill the sync:false secrets in
# the dashboard (they are NOT stored in git).
services:
  - type: web
    name: terra-pride-photo-vote
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
      - key: SUPABASE_PHOTOS_BUCKET
        value: photos
      - key: MAIL_FROM_NAME
        value: Terra Pride
      # Secrets — set these in the Render dashboard (Environment tab):
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
